<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>白板端悬浮球 + 条形组件同屏</title>
    <script type="module" crossorigin src="./assets/index-DN9bzYKf.js"></script>
    <script type="module" crossorigin src="./assets/main-BL8CrAv3.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CqcKWzZm.css">
    <link rel="stylesheet" crossorigin href="./assets/floating-ball-Cg2ujL5X.css">
  </head>
  <body class="same-screen-body">
    <div id="root"></div>
    <div id="whiteboard-floating-ball"></div>
    <div id="ball-toast" class="wbf-toast" role="status" aria-live="polite"></div>

    <script src="./floating-ball.js"></script>
    <script>
      const toast = document.querySelector("#ball-toast");

      window.sameScreenBall = new window.WhiteboardFloatingBall("#whiteboard-floating-ball", {
        open: true,
        showEditor: true,
        scale: 0.82,
        position: { x: 84, y: 34 },
        storageKey: "bubu-whiteboard-floating-ball-same-screen",
        onAction(item) {
          toast.textContent = `悬浮球：${item.label}`;
          toast.classList.add("is-visible");
          window.clearTimeout(window.__sameScreenBallToastTimer);
          window.__sameScreenBallToastTimer = window.setTimeout(() => {
            toast.classList.remove("is-visible");
          }, 1400);
        },
      });
    </script>
  </body>
</html>
