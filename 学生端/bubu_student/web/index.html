<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="步步学生端平板 App 原型 (Bubu student tablet app prototype)">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="步步学生端">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Google Fonts: Noto Sans SC for crisp Chinese rendering on web preview -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #E8EBF2;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
  </style>

  <title>步步学生端</title>
  <link rel="manifest" href="manifest.json">

  <!--
    强制把 devicePixelRatio 提到至少 3.0：让 Flutter Web 内部按 ~3K
    分辨率绘制 canvas（CSS 再压回原大小），实现 Retina/2K 级别的锐利
    文字与图形。这一步必须在 flutter_bootstrap.js 之前执行。
  -->
  <script>
    (function () {
      var realDpr = window.devicePixelRatio || 1.0;
      var targetDpr = Math.max(realDpr, 3.0);
      try {
        Object.defineProperty(window, 'devicePixelRatio', {
          configurable: true,
          get: function () { return targetDpr; },
        });
        console.log('[bubu] devicePixelRatio override: ' + realDpr + ' -> ' + targetDpr);
      } catch (e) {
        console.warn('[bubu] failed to override devicePixelRatio', e);
      }
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
